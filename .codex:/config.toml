sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = true
exclude_tmpdir_env_var = true
writable_roots = [
  "/private/tmp/codex-projects/rayrender",
  "/tmp/codex-projects/rayrender"
]

[shell_environment_policy]
inherit = "core"
set = {
  RAYRENDER_CODEX_TMP = "/private/tmp/codex-projects/rayrender",
  R_LIBS_USER = "/private/tmp/codex-projects/rayrender/R-lib",
  TMPDIR = "/private/tmp/codex-projects/rayrender/tmp",
  CCACHE_DIR = "/private/tmp/codex-projects/rayrender/ccache",
  CCACHE_MAXSIZE = "5G"
}